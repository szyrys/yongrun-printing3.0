<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔罗牌 Banner 效果测试 - 24张卡牌反向匀速移动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Banner 容器 */
        .tarot-banner {
            position: relative;
            width: 100%;
            height: 600px;
            background: #000;
            overflow: hidden;
        }

        /* 上下两排卡牌共用样式 */
        .card-row {
            position: absolute;
            left: 0;
            width: max-content;
            display: flex;
            gap: 0;
            will-change: transform;
        }

        .card-row img {
            display: block;
            width: 120px;
            height: auto;
            object-fit: contain;
        }

        /* 上排：向左移动 */
        .row-top {
            top: 15%;
            animation: scrollLeft 30s linear infinite;
        }

        /* 下排：向右移动 */
        .row-bottom {
            bottom: 15%;
            animation: scrollRight 30s linear infinite;
        }

        /* 向左移动动画 */
        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 向右移动动画 */
        @keyframes scrollRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* 文字层 - 无遮罩，直接浮在顶部 */
        .banner-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 10;
            width: 100%;
            padding: 0 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .banner-text h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .banner-text p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .banner-text .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 30px;
            background: #c9a03d;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .banner-text .btn:hover {
            background: #b08a2c;
            transform: translateY(-2px);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .tarot-banner { height: 400px; }
            .banner-text h1 { font-size: 2rem; }
            .banner-text p { font-size: 1rem; }
            .card-row img { width: 80px; }
        }

        /* 说明区域 */
        .info {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #ddd;
            border-radius: 12px;
        }
        .info h3 { color: #c9a03d; margin-bottom: 10px; }
        .info p { line-height: 1.6; }
        .info code { background: #333; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="tarot-banner">
        <!-- 上排卡牌（向左移动） -->
        <div class="card-row row-top" id="rowTop">
            <!-- 为了无缝循环，将同一组图片复制两份 -->
        </div>

        <!-- 下排卡牌（向右移动） -->
        <div class="card-row row-bottom" id="rowBottom">
            <!-- 同上 -->
        </div>

        <!-- 文字层 -->
        <div class="banner-text">
            <h1>专业印刷 · 定制方案 · 全球交付</h1>
            <p>20+ 年经验 | ISO9001 | FSC 认证 | 全球配送</p>
            <a href="#" class="btn">获取免费报价 →</a>
        </div>
    </div>

    <div class="info">
        <h3>🎴 效果说明</h3>
        <p>✅ 24 张塔罗牌图片：上排 12 张匀速向左移动，下排 12 张匀速向右移动。<br>
           ✅ 背景纯黑色 <code>#000</code>。<br>
           ✅ 文字直接浮在最上层，无任何背景遮罩。<br>
           ✅ 轮播自动无限循环，不可手动干预（无箭头、无圆点）。<br>
           ✅ 图片使用了 tarotai.art 官网的实际塔罗牌图片链接（仅作演示）。</p>
        <p>📌 您可以将此效果直接移植到正式首页，替换图片链接即可。</p>
    </div>

    <script>
        (function() {
            // 从 tarotai.art 获取的塔罗牌图片列表（24张不同卡牌）
            const cardImages = [
                'https://tarotai.art/images/tarot/major/m00.webp',
                'https://tarotai.art/images/tarot/major/m01.webp',
                'https://tarotai.art/images/tarot/major/m02.webp',
                'https://tarotai.art/images/tarot/major/m03.webp',
                'https://tarotai.art/images/tarot/major/m04.webp',
                'https://tarotai.art/images/tarot/major/m05.webp',
                'https://tarotai.art/images/tarot/major/m06.webp',
                'https://tarotai.art/images/tarot/major/m07.webp',
                'https://tarotai.art/images/tarot/major/m08.webp',
                'https://tarotai.art/images/tarot/major/m09.webp',
                'https://tarotai.art/images/tarot/major/m10.webp',
                'https://tarotai.art/images/tarot/major/m11.webp',
                'https://tarotai.art/images/tarot/major/m12.webp',
                'https://tarotai.art/images/tarot/major/m13.webp',
                'https://tarotai.art/images/tarot/major/m14.webp',
                'https://tarotai.art/images/tarot/major/m15.webp',
                'https://tarotai.art/images/tarot/major/m16.webp',
                'https://tarotai.art/images/tarot/major/m17.webp',
                'https://tarotai.art/images/tarot/major/m18.webp',
                'https://tarotai.art/images/tarot/major/m19.webp',
                'https://tarotai.art/images/tarot/major/m20.webp',
                'https://tarotai.art/images/tarot/major/m21.webp',
                'https://tarotai.art/images/tarot/cups/cup01.webp',
                'https://tarotai.art/images/tarot/swords/sword01.webp'
            ];

            // 取前12张给上排，后12张给下排（可混用，这里简单分开）
            const topImages = cardImages.slice(0, 12);
            const bottomImages = cardImages.slice(12, 24);

            const rowTop = document.getElementById('rowTop');
            const rowBottom = document.getElementById('rowBottom');

            // 生成图片HTML，为了无缝循环，复制两份
            function generateImages(imageArray) {
                const items = imageArray.map(src => `<img src="${src}" alt="tarot">`).join('');
                // 两份保证无缝
                return items + items;
            }

            rowTop.innerHTML = generateImages(topImages);
            rowBottom.innerHTML = generateImages(bottomImages);

            // 轮播自动播放，不可手动干预 —— 已经通过 CSS 无限动画实现，无需额外 JS
            // 如需更换图片组，可动态替换 innerHTML，但动画会重置，这里保持静态。
        })();
    </script>

</body>
</html>
