<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner 动画测试 - 塔罗牌风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        /* ===== Hero 轮播容器 ===== */
        .hero-carousel {
            position: relative;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        /* 背景图层包装器 */
        .hero-bg-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 每张背景图 */
        .hero-bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            animation: kenBurns 20s ease-in-out infinite alternate;
        }

        .hero-bg-slide.active {
            opacity: 1;
        }

        /* 不同延迟制造视差感 */
        .hero-bg-slide:nth-child(1) { animation-delay: 0s; }
        .hero-bg-slide:nth-child(2) { animation-delay: 5s; }
        .hero-bg-slide:nth-child(3) { animation-delay: 10s; }

        /* Ken Burns 动画：缓慢缩放 + 轻微位移 */
        @keyframes kenBurns {
            0% {
                transform: scale(1) translate(0, 0);
            }
            50% {
                transform: scale(1.1) translate(-2%, -1%);
            }
            100% {
                transform: scale(1.15) translate(2%, 1%);
            }
        }

        /* 前景内容区 */
        .hero-carousel .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .hero-content {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px 40px;
            border-radius: 20px;
            backdrop-filter: blur(3px);
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: #c9a03d;
            color: white;
        }

        .btn-primary:hover {
            background: #b08a2c;
            transform: translateY(-2px);
        }

        /* 导航按钮（轮播箭头） */
        .hero-prev, .hero-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
        }
        .hero-prev { left: 20px; }
        .hero-next { right: 20px; }
        .hero-prev:hover, .hero-next:hover { background: rgba(0,0,0,0.8); }

        /* 圆点指示器 */
        .hero-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .hero-dot {
            width: 12px;
            height: 12px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }
        .hero-dot.active { background: white; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .hero-carousel { height: 400px; }
            .hero-content { padding: 20px; }
            .hero-content h1 { font-size: 1.8rem; }
        }

        /* 说明文字 */
        .info-note {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .info-note h3 { color: #1a2a4f; margin-bottom: 10px; }
        .info-note p { color: #666; line-height: 1.6; }
        .info-note code { background: #eee; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- Hero Banner 测试区 -->
    <section class="hero-carousel">
        <div class="hero-bg-wrapper">
            <!-- 三张塔罗牌风格背景图（来自 tarotai.art 实际图片链接） -->
            <div class="hero-bg-slide active" style="background-image: url('https://tarotai.art/images/hero/hero-bg-1.webp');"></div>
            <div class="hero-bg-slide" style="background-image: url('https://tarotai.art/images/hero/hero-bg-2.webp');"></div>
            <div class="hero-bg-slide" style="background-image: url('https://tarotai.art/images/hero/hero-bg-3.webp');"></div>
        </div>

        <div class="container">
            <div class="hero-content">
                <h1>专业印刷 · 定制方案 · 全球交付</h1>
                <p>20+ 年经验 | ISO9001 | FSC 认证 | 全球配送</p>
                <a href="#" class="btn btn-primary">获取免费报价 →</a>
            </div>
        </div>

        <!-- 轮播控制按钮（手动切换用） -->
        <button class="hero-prev">❮</button>
        <button class="hero-next">❯</button>
        <div class="hero-dots"></div>
    </section>

    <!-- 说明区域 -->
    <div class="info-note">
        <h3>🎴 动画效果说明</h3>
        <p>背景图使用 <code>kenBurns</code> 动画：20 秒内缓慢放大（scale 1 → 1.15），并伴随轻微位移（translate）。三张图片延迟不同（0s / 5s / 10s），产生层叠视差感。</p>
        <p>图片直接引用自 <code>tarotai.art</code> 官网，仅用于本地测试预览。商业上线请替换为自有版权图片。</p>
        <p>底部圆点和左右箭头可手动切换背景图（JavaScript 逻辑已内嵌）。</p>
    </div>

    <script>
        // 简易轮播逻辑（与动画并行，可手动切换）
        (function() {
            const slides = document.querySelectorAll('.hero-bg-slide');
            const prevBtn = document.querySelector('.hero-prev');
            const nextBtn = document.querySelector('.hero-next');
            const dotsContainer = document.querySelector('.hero-dots');
            let currentIndex = 0;
            let autoTimer = null;

            if (slides.length === 0) return;

            // 创建圆点
            slides.forEach((_, i) => {
                const dot = document.createElement('span');
                dot.classList.add('hero-dot');
                if (i === 0) dot.classList.add('active');
                dot.addEventListener('click', () => goToSlide(i));
                dotsContainer.appendChild(dot);
            });

            function goToSlide(index) {
                slides[currentIndex].classList.remove('active');
                dotsContainer.children[currentIndex].classList.remove('active');
                currentIndex = (index + slides.length) % slides.length;
                slides[currentIndex].classList.add('active');
                dotsContainer.children[currentIndex].classList.add('active');
            }

            function nextSlide() { goToSlide(currentIndex + 1); }
            function prevSlide() { goToSlide(currentIndex - 1); }

            prevBtn.addEventListener('click', () => {
                prevSlide();
                resetTimer();
            });
            nextBtn.addEventListener('click', () => {
                nextSlide();
                resetTimer();
            });

            function startTimer() {
                autoTimer = setInterval(nextSlide, 6000);
            }
            function resetTimer() {
                clearInterval(autoTimer);
                startTimer();
            }

            // 鼠标悬停暂停自动播放
            const carousel = document.querySelector('.hero-carousel');
            carousel.addEventListener('mouseenter', () => clearInterval(autoTimer));
            carousel.addEventListener('mouseleave', startTimer);

            startTimer();
        })();
    </script>

</body>
</html>
