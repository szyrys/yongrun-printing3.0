        const topImages = CARD_IMAGES.slice(0, 12);
        const bottomImages = CARD_IMAGES.slice(12, 24);

        function renderTrack(container, imageArray) {
            // 渲染两组以实现无缝循环
            for (let i = 0; i < 2; i++) {
                imageArray.forEach(src => {
                    const wrap = document.createElement('div');
                    wrap.className = 'card-wrapper';
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = 'card';
                    img.className = 'card-img';
                    img.loading = 'lazy';
                    wrap.appendChild(img);
                    container.appendChild(wrap);
                });
            }
        }

        const trackTop = document.getElementById('trackTopNew');
        const trackBottom = document.getElementById('trackBottomNew');
        if (trackTop) renderTrack(trackTop, topImages);
        if (trackBottom) renderTrack(trackBottom, bottomImages);
    })();
