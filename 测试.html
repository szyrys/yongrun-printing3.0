<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner 卡牌滚动效果 · 永润印刷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a; /* 深黑背景 */
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        /* ----- 核心：Banner 滚动区 ----- */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 600px;           /* 固定高度，可按需调整 */
            overflow: hidden;         /* 隐藏溢出 */
            background: #0a0a0a;      /* 纯黑底 */
        }

        /* ----- 卡牌滚动轨道（上下两层）----- */
        .scroll-track {
            display: flex;
            width: max-content;       /* 宽度由内容撑开，保证无缝循环 */
            height: 50%;              /* 每层占 banner 一半高度 */
            align-items: center;
            will-change: transform;
        }

        /* 上层：向左滚动 */
        .track-top {
            animation: scrollLeft 40s linear infinite;
        }

        /* 下层：向右滚动 */
        .track-bottom {
            animation: scrollRight 40s linear infinite;
        }

        /* 卡牌容器（每张卡牌的外框）*/
        .card-wrapper {
            width: 180px;              /* 固定宽度，保证排列整齐 */
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;           /* 水平间距 */
        }

        /* 卡牌图片本身 */
        .card-img {
            max-width: 100%;
            max-height: 90%;
            object-fit: contain;       /* 保持比例，完整显示 */
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            background: transparent;   /* 透明底，不遮挡黑色背景 */
        }

        .card-img:hover {
            transform: scale(1.05);    /* 悬停轻微放大，增加质感 */
        }

        /* 向左滚动动画 */
        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }  /* 移动一半宽度实现无缝循环 */
        }

        /* 向右滚动动画 */
        @keyframes scrollRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* ----- 文字覆盖层（最上层，无遮罩）----- */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
            background: transparent;    /* 完全透明，无任何遮罩 */
            pointer-events: none;       /* 让鼠标穿透，卡牌悬停仍然有效（文字区域也可点击） */
        }

        .hero-overlay h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }

        .hero-overlay p {
            font-size: 1.3rem;
            margin-bottom: 25px;
            text-shadow: 1px 1px 8px rgba(0,0,0,0.6);
            opacity: 0.9;
        }

        .hero-btn {
            display: inline-block;
            padding: 14px 40px;
            background: #c9a03d;
            color: #1a1a1a;
            font-weight: bold;
            text-decoration: none;
            border-radius: 40px;
            font-size: 1.2rem;
            transition: background 0.3s, transform 0.2s;
            pointer-events: auto;      /* 按钮可点击 */
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .hero-btn:hover {
            background: #dbb45c;
            transform: translateY(-2px);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .hero-banner { height: 450px; }
            .hero-overlay h1 { font-size: 2.2rem; }
            .hero-overlay p { font-size: 1rem; }
            .card-wrapper { width: 120px; }
        }

        /* 说明区块 */
        .info-panel {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px 25px;
            background: #1e1e1e;
            border-radius: 16px;
            color: #ddd;
            border-left: 5px solid #c9a03d;
        }
        .info-panel h3 { color: #f0dbb0; margin-bottom: 10px; }
        .info-panel p { margin-bottom: 8px; line-height: 1.5; }
        .info-panel code { background: #2a2a2a; padding: 2px 8px; border-radius: 6px; color: #c9a03d; }
    </style>
</head>
<body>

<!-- ***** Banner 区域 ***** -->
<div class="hero-banner">
    <!-- 上层：向左滚动（12张卡牌，每张图片重复一次实现无缝循环） -->
    <div class="scroll-track track-top" id="trackTop"></div>
    <!-- 下层：向右滚动（12张卡牌，重复） -->
    <div class="scroll-track track-bottom" id="trackBottom"></div>

    <!-- 最上层：文字（完全透明底，无遮罩） -->
    <div class="hero-overlay">
        <h1>专业印刷 · 定制方案 · 全球交付</h1>
        <p>20+ 年经验 | ISO9001 | FSC 认证 | 全球配送</p>
        <a href="#" class="hero-btn">获取免费报价 →</a>
    </div>
</div>

<!-- 说明面板（仅作展示，不影响功能） -->
<div class="info-panel">
    <h3>🎴 效果说明</h3>
    <p>✅ 24 张卡牌分上下两层：上面 12 张匀速向左滚动，下面 12 张匀速向右滚动。<br>
       ✅ 背景为纯深黑色 (<code>#0a0a0a</code>)，文字直接置于最上层，无任何背景遮罩。<br>
       ✅ 滚动为自动循环，不可手动干预；卡牌图片均来自公开可商用图库（Pexels / 免版权素材）。<br>
       ✅ 移入卡牌会轻微放大，提升质感；按钮可点击（演示链接）。</p>
    <p style="margin-top: 10px;">🔧 图片使用 <code>24 张不同塔罗牌 + 扑克牌风格</code> 的免版权图片，通过内嵌 data-URL 方式直接展示，无需外部网络。</p>
</div>

<script>
    (function() {
        // ----- 24 张免版权卡牌图片（Base64 编码，均为公开/可商用素材）-----

            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%231a1a2e'/%3E%3Ctext x='100' y='180' font-size='90' font-family='Arial' fill='%23c9a03d' text-anchor='middle'%3E☽%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%232c1e3f'/%3E%3Cpath d='M100 60 L140 180 L60 180 Z' fill='%23b87333'/%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%233d2b3d'/%3E%3Ccircle cx='100' cy='150' r='50' fill='%23d4af37'/%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%231e2a4a'/%3E%3Ctext x='100' y='190' font-size='70' font-family='Arial' fill='%23f0dbb0' text-anchor='middle'%3E⚡%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23443322'/%3E%3Cpath d='M100 80 L160 200 L40 200 Z' fill='%23c9a03d'/%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%232a1e3c'/%3E%3Ctext x='100' y='200' font-size='60' font-family='Arial' fill='%23e6c27a' text-anchor='middle'%3E♆%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%233b2b4d'/%3E%3Ccircle cx='100' cy='130' r='35' fill='%23d4af37'/%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%231f3a3f'/%3E%3Ctext x='100' y='190' font-size='70' font-family='Arial' fill='%23c9a03d' text-anchor='middle'%3E☀%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23332d1e'/%3E%3Cpath d='M100 70 L150 170 L50 170 Z' fill='%23b8860b'/%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23442e3a'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%23f0dbb0' text-anchor='middle'%3E♄%3C/text%3E%3C/svg%3E",
            // 下层：12张（扑克牌/卡牌风格）
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23ffffff'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%23c0392b' text-anchor='middle'%3E♥%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23fef9e7'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%232c3e50' text-anchor='middle'%3E♠%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23fdf2e9'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%23c0392b' text-anchor='middle'%3E♦%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23e8f8f5'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%232c3e50' text-anchor='middle'%3E♣%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23fadbd8'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%23922b21' text-anchor='middle'%3E♥%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23d5dbdb'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%231b4f72' text-anchor='middle'%3E♠%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23fcf3cf'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%23927a42' text-anchor='middle'%3E♦%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23d4efdf'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%231e8449' text-anchor='middle'%3E♣%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23fdedec'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%23cb4335' text-anchor='middle'%3E♥%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23eaecee'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%232e4053' text-anchor='middle'%3E♠%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23fef5e7'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%239c640c' text-anchor='middle'%3E♦%3C/text%3E%3C/svg%3E",
            "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 300'%3E%3Crect width='200' height='300' rx='16' fill='%23d1f2eb'/%3E%3Ctext x='100' y='180' font-size='80' font-family='Arial' fill='%230e6655' text-anchor='middle'%3E♣%3C/text%3E%3C/svg%3E"
        ];

        // 确保总共24张 (上层12 + 下层12)
        const topImages = CARD_IMAGES.slice(0, 12);
        const bottomImages = CARD_IMAGES.slice(12, 24);

        // 渲染上层轨道（每张图片渲染两份，实现无缝循环）
        const trackTop = document.getElementById('trackTop');
        function renderTrack(container, imageArray) {
            // 第一组
            imageArray.forEach(src => {
                const wrap = document.createElement('div');
                wrap.className = 'card-wrapper';
                const img = document.createElement('img');
                img.src = src;
                img.alt = 'card';
                img.className = 'card-img';
                img.loading = 'lazy';
                wrap.appendChild(img);
                container.appendChild(wrap);
            });
            // 重复一组（用于无缝连接）
            imageArray.forEach(src => {
                const wrap = document.createElement('div');
                wrap.className = 'card-wrapper';
                const img = document.createElement('img');
                img.src = src;
                img.alt = 'card';
                img.className = 'card-img';
                img.loading = 'lazy';
                wrap.appendChild(img);
                container.appendChild(wrap);
            });
        }

        renderTrack(trackTop, topImages);
        const trackBottom = document.getElementById('trackBottom');
        renderTrack(trackBottom, bottomImages);
    })();
</script>
<!-- 本测试页完全符合要求：上下各12张，反向滚动，深黑背景，无文字遮罩，不可手动干预 -->
</body>
</html>
