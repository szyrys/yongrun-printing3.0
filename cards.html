<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards - Yongrun Printing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 产品卡片样式 - 统一尺寸 */
        .product-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)) !important;
            gap: 30px !important;
        }
        
        .product-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        /* 图片容器固定尺寸 */
        .product-card .product-img {
            width: 100%;
            height: 200px;
            background: #1a2a4f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .product-card .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-card .product-img i {
            font-size: 3rem;
            color: white;
        }
        
        .product-card h3 {
            padding: 15px 15px 5px;
            color: #1a2a4f;
        }
        
        .product-card p {
            padding: 0 15px 15px;
            color: #666;
            font-size: 14px;
        }
        
        .loading, .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">
    <main style="flex: 1;">
        <!-- 语言切换栏 -->
        <div class="language-bar">
            <div class="container">
                <div class="language-selector" id="languageSelector"></div>
            </div>
        </div>

        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <a href="index.html">YONGRUN<span> Printing</span></a>
                </div>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                    <li class="dropdown">
                        <a href="javascript:void(0)" data-i18n="nav_products">Products</a>
                        <ul class="dropdown-menu">
                            <li><a href="cards.html">Cards</a></li>
                            <li><a href="books.html">Books</a></li>
                            <li><a href="board-games.html">Board Games</a></li>
                            <li><a href="puzzles.html">Puzzles</a></li>
                        </ul>
                    </li>
                    <li><a href="custom-process.html" data-i18n="nav_process">Custom Process</a></li>
                    <li><a href="craft-options.html" data-i18n="nav_craft">Materials & Finishes</a></li>
                    <li><a href="about.html" data-i18n="nav_about">About Us</a></li>
                    <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
                </ul>
                <div class="hamburger" id="hamburger">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>

        <!-- 页面标题 -->
        <section class="page-header">
            <div class="container">
                <h1 data-i18n="nav_cards">Cards</h1>
                <p data-i18n="category_cards_desc">Premium custom playing cards, tarot, holographic cards and more</p>
            </div>
        </section>

        <!-- 产品分类展示 -->
        <section class="products-page" style="padding: 60px 0;">
            <div class="container">
                <div class="product-grid" id="cardsGrid">
                    <!-- 产品卡片会通过JS动态生成 -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Shenzhen Yongrun Printing Co., Ltd. <span data-i18n="footer_rights">All Rights Reserved</span></p>
        </div>
    </footer>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 网站脚本 -->
    <script src="js/supabase-config.js"></script>
    <script src="js/common.js"></script>
    <script>
        async function loadCardProducts() {
            const grid = document.getElementById('cardsGrid');
            if (!grid) return;
            
            const loadingText = (window.translations && window.translations.loading_text) || 'Loading products...';
            grid.innerHTML = `<div class="loading">${loadingText}</div>`;
            
            try {
                const { data, error } = await window.supabaseClient
                    .from('products')
                    .select('*')
                    .eq('category', 'cards')
                    .order('sort_order', { ascending: true });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    const emptyText = (window.translations && window.translations.no_products) || 'No products found';
                    grid.innerHTML = `<div class="empty-state">${emptyText}</div>`;
                    return;
                }
                
                grid.innerHTML = '';
                
                data.forEach(product => {
                    const lang = currentLang || 'en';
                    let name = product.name_en;
                    let desc = product.desc_en;
                    
                    if (lang === 'zh-CN') {
                        name = product.name_zh || product.name_en;
                        desc = product.desc_zh || product.desc_en;
                    } else if (lang === 'zh-TW') {
                        name = product.name_zh_tw || product.name_en;
                        desc = product.desc_zh_tw || product.desc_en;
                    } else if (lang === 'es') {
                        name = product.name_es || product.name_en;
                        desc = product.desc_es || product.desc_en;
                    } else if (lang === 'de') {
                        name = product.name_de || product.name_en;
                        desc = product.desc_de || product.desc_en;
                    } else if (lang === 'pt') {
                        name = product.name_pt || product.name_en;
                        desc = product.desc_pt || product.desc_en;
                    } else if (lang === 'ar') {
                        name = product.name_ar || product.name_en;
                        desc = product.desc_ar || product.desc_en;
                    } else if (lang === 'ja') {
                        name = product.name_ja || product.name_en;
                        desc = product.desc_ja || product.desc_en;
                    } else if (lang === 'ko') {
                        name = product.name_ko || product.name_en;
                        desc = product.desc_ko || product.desc_en;
                    }
                    
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.onclick = () => { window.location.href = `product.html?slug=${product.slug}`; };
                    
                    const imageUrl = product.image_url ? product.image_url.split(',')[0] : null;
                    
                    if (imageUrl) {
                        card.innerHTML = `
                            <div class="product-img">
                                <img src="${imageUrl}" alt="${name}">
                            </div>
                            <h3>${name}</h3>
                            <p>${desc || ''}</p>
                        `;
                    } else {
                        card.innerHTML = `
                            <div class="product-img">
                                <i class="fas fa-image"></i>
                            </div>
                            <h3>${name}</h3>
                            <p>${desc || ''}</p>
                        `;
                    }
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error('加载产品失败:', err);
                const errorText = (window.translations && window.translations.load_error) || 'Failed to load, please refresh';
                grid.innerHTML = `<div class="empty-state">${errorText}</div>`;
            }
        }
        
        // 页面加载后执行
        document.addEventListener('DOMContentLoaded', () => {
            loadCardProducts();
        });
        
        // 监听语言切换，重新加载产品卡片
        const originalLoadLanguage = loadLanguage;
        window.loadLanguage = async function(langCode) {
            await originalLoadLanguage(langCode);
            loadCardProducts();
        };
    </script>
</body>
</html>
