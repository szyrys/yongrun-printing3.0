<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards - Yongrun Printing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 确保产品网格样式正确 */
        .product-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)) !important;
            gap: 30px !important;
        }
        .product-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-img {
            height: 200px;
            background: #1a2a4f;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        .product-card h3 {
            padding: 15px 15px 5px;
            color: #1a2a4f;
        }
        .product-card p {
            padding: 0 15px 15px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">
    <main style="flex: 1;">
        <!-- 语言切换栏 -->
        <div class="language-bar">
            <div class="container">
                <div class="language-selector" id="languageSelector"></div>
            </div>
        </div>

        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <a href="index.html">YONGRUN<span> Printing</span></a>
                </div>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                    <li class="dropdown">
                        <a href="javascript:void(0)" data-i18n="nav_products">Products</a>
                        <ul class="dropdown-menu">
                            <li><a href="cards.html">Cards</a></li>
                            <li><a href="books.html">Books</a></li>
                            <li><a href="board-games.html">Board Games</a></li>
                            <li><a href="puzzles.html">Puzzles</a></li>
                        </ul>
                    </li>
                    <li><a href="custom-process.html" data-i18n="nav_process">Custom Process</a></li>
                    <li><a href="craft-options.html" data-i18n="nav_craft">Materials & Finishes</a></li>
                    <li><a href="about.html" data-i18n="nav_about">About Us</a></li>
                    <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
                </ul>
                <div class="hamburger" id="hamburger">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>

        <!-- 页面标题 -->
        <section class="page-header">
            <div class="container">
                <h1 data-i18n="nav_cards">Cards</h1>
                <p data-i18n="category_cards_desc">Premium custom playing cards, tarot, holographic cards and more</p>
            </div>
        </section>

        <!-- 产品分类展示 -->
        <section class="products-page" style="padding: 60px 0;">
            <div class="container">
                <div class="product-grid" id="cardsGrid">
                    <!-- 产品卡片会通过JS动态生成 -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Shenzhen Yongrun Printing Co., Ltd. <span data-i18n="footer_rights">All Rights Reserved</span></p>
        </div>
    </footer>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 网站脚本 -->
    <script src="js/supabase-config.js"></script>
    <script src="js/common.js"></script>
    <script>
        // 从多语言文件读取产品数据
        function loadCardProducts() {
            const grid = document.getElementById('cardsGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            const products = [
                { key: "playingcards", icon: "fas fa-dice-d6" },
                { key: "tarot", icon: "fas fa-moon" },
                { key: "laser", icon: "fas fa-star-of-life" },
                { key: "flashcards", icon: "fas fa-brain" }
            ];
            
            products.forEach(product => {
                const nameKey = `product_${product.key}_title`;
                const descKey = `product_${product.key}_desc`;
                
                const name = window.translations ? (window.translations[nameKey] || product.key) : product.key;
                const desc = window.translations ? (window.translations[descKey] || '') : '';
                
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => { window.location.href = `product.html?slug=${product.key}`; };
                card.innerHTML = `
                    <div class="product-img"><i class="${product.icon}"></i></div>
                    <h3>${name}</h3>
                    <p>${desc}</p>
                `;
                grid.appendChild(card);
            });
        }
        
        // 页面加载后执行
        document.addEventListener('DOMContentLoaded', () => {
            loadCardProducts();
        });
        
        // 监听语言切换，重新加载产品卡片
        const originalLoadLanguage = loadLanguage;
        window.loadLanguage = async function(langCode) {
            await originalLoadLanguage(langCode);
            loadCardProducts();
        };
    </script>
</body>
</html>
