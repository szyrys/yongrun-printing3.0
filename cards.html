    <style>
        /* 产品卡片样式 */
        .products-section-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .products-section-header h1 {
            font-size: 2.5rem;
            color: #1a2a4f;
            margin-bottom: 10px;
        }
        .products-section-header p {
            color: #666;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }
        
        .product-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        /* 1:1 正方形图片容器 */
        .product-card .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #1a2a4f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .product-card .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-card .product-img i {
            font-size: 3rem;
            color: white;
        }
        
        .product-card h3 {
            padding: 15px 15px 5px;
            color: #1a2a4f;
            font-size: 1.1rem;
        }
        
        /* 产品描述：单行显示，超出30字符省略 */
        .product-card p {
            padding: 0 15px 15px;
            color: #666;
            font-size: 14px;
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        
        /* 加载更多按钮 */
        .load-more-container {
            text-align: center;
            margin-top: 40px;
        }
        .load-more-btn {
            background: transparent;
            border: 2px solid #c9a03d;
            color: #1a2a4f;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .load-more-btn:hover {
            background: #c9a03d;
            color: white;
        }
        
        .loading, .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        @media (max-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 截断文本函数（30个字符）
        function truncateText(text, maxLength) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }
        
        let allProducts = [];
        let currentPage = 1;
        const pageSize = 12;
        let isLoading = false;
        
        // 根据当前语言获取产品名称和描述
        function getLocalizedField(product, fieldName) {
            const lang = currentLang || 'en';
            if (lang === 'zh-CN') return product[`${fieldName}_zh`] || product[`${fieldName}_en`] || '';
            if (lang === 'zh-TW') return product[`${fieldName}_zh_tw`] || product[`${fieldName}_en`] || '';
            if (lang === 'es') return product[`${fieldName}_es`] || product[`${fieldName}_en`] || '';
            if (lang === 'de') return product[`${fieldName}_de`] || product[`${fieldName}_en`] || '';
            if (lang === 'pt') return product[`${fieldName}_pt`] || product[`${fieldName}_en`] || '';
            if (lang === 'ar') return product[`${fieldName}_ar`] || product[`${fieldName}_en`] || '';
            if (lang === 'ja') return product[`${fieldName}_ja`] || product[`${fieldName}_en`] || '';
            if (lang === 'ko') return product[`${fieldName}_ko`] || product[`${fieldName}_en`] || '';
            return product[`${fieldName}_en`] || '';
        }
        
        // 渲染产品卡片
        function renderProducts(products) {
            const grid = document.getElementById('cardsGrid');
            if (!grid) return;
            
            products.forEach(product => {
                const name = getLocalizedField(product, 'name');
                const desc = getLocalizedField(product, 'desc');
                
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => { window.location.href = `product.html?slug=${product.slug}`; };
                
                const imageUrl = product.image_url ? product.image_url.split(',')[0] : null;
                
                // 截断描述为30字符
                const shortDesc = truncateText(desc, 30);
                
                if (imageUrl) {
                    card.innerHTML = `
                        <div class="product-img">
                            <img src="${imageUrl}" alt="${name}">
                        </div>
                        <h3>${name}</h3>
                        <p>${shortDesc}</p>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="product-img">
                            <i class="fas fa-image"></i>
                        </div>
                        <h3>${name}</h3>
                        <p>${shortDesc}</p>
                    `;
                }
                grid.appendChild(card);
            });
        }
        
        // 加载更多
        function loadMore() {
            if (isLoading) return;
            isLoading = true;
            
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const nextProducts = allProducts.slice(start, end);
            
            if (nextProducts.length > 0) {
                renderProducts(nextProducts);
                currentPage++;
            }
            
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            if (currentPage * pageSize >= allProducts.length) {
                loadMoreContainer.style.display = 'none';
            }
            
            isLoading = false;
        }
        
       async function loadCardProducts() {
    const grid = document.getElementById('cardsGrid');
    if (!grid) return;
    
    grid.innerHTML = '<div class="loading">Loading products...</div>';
    
    try {
        // 获取所有卡牌类产品
        const { data: products, error } = await window.supabaseClient
            .from('products')
            .select('*')
            .eq('category', 'cards');
        
        if (error) throw error;
        
        if (!products || products.length === 0) {
            grid.innerHTML = '<div class="empty-state">No products found</div>';
            return;
        }
        
        // 获取点击统计数据
        const { data: clicks } = await window.supabaseClient
            .from('product_clicks')
            .select('slug, click_count');
        
        // 创建点击映射
        const clickMap = new Map();
        if (clicks) {
            clicks.forEach(c => clickMap.set(c.slug, c.click_count));
        }
        
        // 分离置顶和非置顶产品
        const featuredProducts = products.filter(p => p.is_featured === true);
        const normalProducts = products.filter(p => p.is_featured !== true);
        
        // 置顶产品按 sort_order 排序
        featuredProducts.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
        
        // 非置顶产品按点击热度降序排序
        normalProducts.sort((a, b) => {
            const aClicks = clickMap.get(a.slug) || 0;
            const bClicks = clickMap.get(b.slug) || 0;
            if (aClicks !== bClicks) return bClicks - aClicks;
            return (a.sort_order || 0) - (b.sort_order || 0);
        });
        
        // 合并：只取前4个置顶，其余按热度
        const finalProducts = [...featuredProducts.slice(0, 4), ...normalProducts];
        
        grid.innerHTML = '';
        
        finalProducts.forEach(product => {
            const name = getLocalizedField(product, 'name');
            const desc = getLocalizedField(product, 'desc');
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => { window.location.href = `product.html?slug=${product.slug}`; };
            const imageUrl = product.image_url ? product.image_url.split(',')[0] : null;
            if (imageUrl) {
                card.innerHTML = `<div class="product-img"><img src="${imageUrl}" alt="${name}"></div><h3>${name}</h3><p>${truncateText(desc, 30)}</p>`;
            } else {
                card.innerHTML = `<div class="product-img"><i class="fas fa-image"></i></div><h3>${name}</h3><p>${truncateText(desc, 30)}</p>`;
            }
            grid.appendChild(card);
        });
        
        // 隐藏加载更多按钮（因为全部显示）
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        if (loadMoreContainer) loadMoreContainer.style.display = 'none';
        
    } catch (err) {
        console.error('加载失败:', err);
        grid.innerHTML = '<div class="empty-state">Failed to load, please refresh</div>';
    }
}
        
        document.getElementById('loadMoreBtn')?.addEventListener('click', loadMore);
        
        document.addEventListener('DOMContentLoaded', () => {
            loadCardProducts();
        });
        
        const originalLoadLanguage = loadLanguage;
        window.loadLanguage = async function(langCode) {
            await originalLoadLanguage(langCode);
            allProducts = [];
            currentPage = 1;
            await loadCardProducts();
        };
    </script>
