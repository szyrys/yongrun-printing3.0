<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Product - Yongrun Printing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .product-gallery {
            position: relative;
        }
        .main-image img {
            width: 600px;
            height: 600px;
            object-fit: cover;
            border-radius: 12px;
        }
        .thumbnail-list {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .thumb-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .thumb-img:hover {
            transform: scale(1.05);
        }
        .nav-arrow {
            position: absolute;
            top: 300px;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.15);
            color: white;
            border: none;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 1.5rem;
            border-radius: 50%;
            transition: all 0.3s;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .nav-arrow:hover {
            background: rgba(0,0,0,0.35);
        }
        .prev-arrow {
            left: 15px;
        }
        .next-arrow {
            right: 15px;
        }
        @media (max-width: 768px) {
            .main-image img {
                width: 100%;
                height: auto;
            }
            .thumb-img {
                width: 60px;
                height: 60px;
            }
            .nav-arrow {
                padding: 8px 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="language-bar">
        <div class="container">
            <div class="language-selector" id="languageSelector"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">YONGRUN<span> Printing</span></a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                <li class="dropdown">
                    <a href="javascript:void(0)" data-i18n="nav_products">Products</a>
                    <ul class="dropdown-menu">
                        <li><a href="cards.html">Cards</a></li>
                        <li><a href="books.html">Books</a></li>
                        <li><a href="board-games.html">Board Games</a></li>
                        <li><a href="puzzles.html">Puzzles</a></li>
                    </ul>
                </li>
                <li><a href="custom-process.html" data-i18n="nav_process">Custom Process</a></li>
                <li><a href="craft-options.html" data-i18n="nav_craft">Craft Options</a></li>
                <li><a href="about.html" data-i18n="nav_about">About Us</a></li>
                <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <section id="productDetail" style="padding: 60px 0;">
        <div class="container">
            <div class="loading" style="text-align: center;">Loading product...</div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Shenzhen Yongrun Printing Co., Ltd. <span data-i18n="footer_rights">All Rights Reserved</span></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/common.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        async function loadProduct() {
            const container = document.getElementById('productDetail');
            if (!slug) {
                container.innerHTML = '<div class="container"><p style="text-align: center;">Product not found</p></div>';
                return;
            }

            try {
                const { data, error } = await window.supabaseClient
                    .from('products')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error) throw error;
                if (!data) {
                    container.innerHTML = '<div class="container"><p style="text-align: center;">Product not found</p></div>';
                    return;
                }

                document.title = `${data.name} - Yongrun Printing`;
                document.getElementById('pageTitle').innerText = `${data.name} - Yongrun Printing`;

                const featuresList = data.features ? data.features.split('|').map(f => `<li><i class="fas fa-check-circle" style="color: #c9a03d;"></i> ${f}</li>`).join('') : '';

                // 处理图片列表
                let images = [];
                if (data.image_url && data.image_url.includes(',')) {
                    images = data.image_url.split(',');
                } else if (data.image_url) {
                    images = [data.image_url];
                } else {
                    images = [
                        'https://picsum.photos/id/20/600/400',
                        'https://picsum.photos/id/40/600/400',
                        'https://picsum.photos/id/42/600/400',
                        'https://picsum.photos/id/104/600/400',
                        'https://picsum.photos/id/106/600/400',
                        'https://picsum.photos/id/107/600/400'
                    ];
                }

                // 生成缩略图 HTML
                let thumbnailsHtml = '';
                images.forEach((img, idx) => {
                    thumbnailsHtml += `<img src="${img}" class="thumb-img" data-index="${idx}" style="border-color: ${idx === 0 ? '#c9a03d' : '#ddd'};">`;
                });

                container.innerHTML = `
                    <div class="container">
                        <div style="display: grid; grid-template-columns: 600px 1fr; gap: 50px;">
                            <div>
                                <div class="product-gallery">
                                    <button class="nav-arrow prev-arrow" id="prevArrow">❮</button>
                                    <div class="main-image">
                                        <img id="mainProductImage" src="${images[0]}" alt="${data.name}">
                                    </div>
                                    <button class="nav-arrow next-arrow" id="nextArrow">❯</button>
                                    <div class="thumbnail-list">
                                        ${thumbnailsHtml}
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h1 style="color: #1a2a4f; margin-bottom: 20px;">${data.name}</h1>
                                <p style="margin-bottom: 15px;">${data.full_desc || data.short_desc}</p>
                                <h3 style="color: #1a2a4f; margin: 20px 0 10px;">Features</h3>
                                <ul style="list-style: none; padding: 0;">
                                    ${featuresList}
                                </ul>
                                <a href="contact.html" class="btn btn-primary" style="margin-top: 30px;">Request a Quote →</a>
                            </div>
                        </div>
                    </div>
                `;

                // 绑定缩略图点击事件
                const thumbImgs = document.querySelectorAll('.thumb-img');
                const mainImg = document.getElementById('mainProductImage');
                const prevBtn = document.getElementById('prevArrow');
                const nextBtn = document.getElementById('nextArrow');
                let autoInterval;
                let currentIndex = 0;

                function stopAutoPlay() {
                    if (autoInterval) {
                        clearInterval(autoInterval);
                        autoInterval = null;
                    }
                }

                function startAutoPlay() {
                    if (autoInterval) stopAutoPlay();
                    autoInterval = setInterval(() => {
                        currentIndex = (currentIndex + 1) % images.length;
                        const nextImg = thumbImgs[currentIndex];
                        if (nextImg) {
                            mainImg.src = nextImg.getAttribute('src');
                            thumbImgs.forEach(t => t.style.borderColor = '#ddd');
                            thumbImgs[currentIndex].style.borderColor = '#c9a03d';
                        }
                    }, 3000);
                }

                // 缩略图点击
                thumbImgs.forEach((thumb, idx) => {
                    thumb.addEventListener('click', () => {
                        stopAutoPlay();
                        mainImg.src = thumb.getAttribute('src');
                        thumbImgs.forEach(t => t.style.borderColor = '#ddd');
                        thumb.style.borderColor = '#c9a03d';
                        currentIndex = idx;
                        startAutoPlay();
                    });
                });

                // 左箭头点击
                prevBtn.addEventListener('click', () => {
                    stopAutoPlay();
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                    const prevImg = thumbImgs[currentIndex];
                    if (prevImg) {
                        mainImg.src = prevImg.getAttribute('src');
                        thumbImgs.forEach(t => t.style.borderColor = '#ddd');
                        thumbImgs[currentIndex].style.borderColor = '#c9a03d';
                    }
                    startAutoPlay();
                });

                // 右箭头点击
                nextBtn.addEventListener('click', () => {
                    stopAutoPlay();
                    currentIndex = (currentIndex + 1) % images.length;
                    const nextImg = thumbImgs[currentIndex];
                    if (nextImg) {
                        mainImg.src = nextImg.getAttribute('src');
                        thumbImgs.forEach(t => t.style.borderColor = '#ddd');
                        thumbImgs[currentIndex].style.borderColor = '#c9a03d';
                    }
                    startAutoPlay();
                });

                const gallery = document.querySelector('.product-gallery');
                gallery.addEventListener('mouseenter', stopAutoPlay);
                gallery.addEventListener('mouseleave', startAutoPlay);

                startAutoPlay();
            } catch (err) {
                console.error('加载产品失败:', err);
                container.innerHTML = '<div class="container"><p style="text-align: center;">Failed to load product. Please refresh.</p></div>';
            }
        }

        loadProduct();
    </script>
</body>
</html>
