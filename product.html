<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Product - Yongrun Printing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="language-bar">
        <div class="container">
            <div class="language-selector" id="languageSelector"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">YONGRUN<span> Printing</span></a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                <li class="dropdown">
                    <a href="javascript:void(0)" data-i18n="nav_products">Products</a>
                    <ul class="dropdown-menu">
                        <li><a href="cards.html">Cards</a></li>
                        <li><a href="books.html">Books</a></li>
                        <li><a href="board-games.html">Board Games</a></li>
                        <li><a href="puzzles.html">Puzzles</a></li>
                    </ul>
                </li>
                <li><a href="custom-process.html" data-i18n="nav_process">Custom Process</a></li>
                <li><a href="craft-options.html" data-i18n="nav_craft">Craft Options</a></li>
                <li><a href="about.html" data-i18n="nav_about">About Us</a></li>
                <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <section id="productDetail" style="padding: 60px 0;">
        <div class="container">
            <div class="loading" style="text-align: center;">Loading product...</div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Shenzhen Yongrun Printing Co., Ltd. <span data-i18n="footer_rights">All Rights Reserved</span></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/common.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        async function loadProduct() {
            const container = document.getElementById('productDetail');
            if (!slug) {
                container.innerHTML = '<div class="container"><p style="text-align: center;">Product not found</p></div>';
                return;
            }

            try {
                const { data, error } = await window.supabaseClient
                    .from('products')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error) throw error;
                if (!data) {
                    container.innerHTML = '<div class="container"><p style="text-align: center;">Product not found</p></div>';
                    return;
                }

                document.title = `${data.name} - Yongrun Printing`;
                document.getElementById('pageTitle').innerText = `${data.name} - Yongrun Printing`;

                const featuresList = data.features ? data.features.split('|').map(f => `<li><i class="fas fa-check-circle" style="color: #c9a03d;"></i> ${f}</li>`).join('') : '';

                container.innerHTML = `
                    <div class="container">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 50px;">
                            <div>
                                <img src="${data.image_url || 'https://picsum.photos/id/20/500/400'}" alt="${data.name}" style="width: 100%; border-radius: 12px;">
                            </div>
                            <div>
                                <h1 style="color: #1a2a4f; margin-bottom: 20px;">${data.name}</h1>
                                <p style="margin-bottom: 15px;">${data.full_desc || data.short_desc}</p>
                                <h3 style="color: #1a2a4f; margin: 20px 0 10px;">Features</h3>
                                <ul style="list-style: none; padding: 0;">
                                    ${featuresList}
                                </ul>
                                <a href="contact.html" class="btn btn-primary" style="margin-top: 30px;">Request a Quote →</a>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.error('加载产品失败:', err);
                container.innerHTML = '<div class="container"><p style="text-align: center;">Failed to load product. Please refresh.</p></div>';
            }
        }

        loadProduct();
    </script>
</body>
</html>
