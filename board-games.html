    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- 语言切换栏 -->
    <div class="language-bar">
        <div class="container">
            <div class="language-selector" id="languageSelector"></div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">YONGRUN<span> Printing</span></a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                <li class="dropdown">
                    <a href="javascript:void(0)" data-i18n="nav_products">Products</a>
                    <ul class="dropdown-menu">
                        <li><a href="cards.html">Cards</a></li>
                        <li><a href="books.html">Books</a></li>
                        <li><a href="board-games.html">Board Games</a></li>
                        <li><a href="puzzles.html">Puzzles</a></li>
                    </ul>
                </li>
                <li><a href="custom-process.html" data-i18n="nav_process">Custom Process</a></li>
                <li><a href="craft-options.html" data-i18n="nav_craft">Materials & Finishes</a></li>
                <li><a href="about.html" data-i18n="nav_about">About Us</a></li>
                <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1>Board Games</h1>
            <p>Custom board game printing - showcase of our work</p>
        </div>
    </section>

    <!-- 印刷案例展示（图片占位，后续替换） -->
    <section class="products-page" style="padding: 60px 0;">
        <div class="container">
            <div class="product-grid" id="boardGamesGrid">
                <!-- 案例卡片会通过JS动态生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Shenzhen Yongrun Printing Co., Ltd. <span data-i18n="footer_rights">All Rights Reserved</span></p>
        </div>
    </footer>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 网站脚本 -->
    <script src="js/supabase-config.js"></script>
    <script src="js/common.js"></script>
    <script>
        // 桌游类印刷案例（占位图片，后续替换真实封面）
        const caseStudies = [
    { name: "Strategy Board Game", desc: "Custom box + cards + rulebook", icon: "fas fa-chess-board", img: "https://picsum.photos/id/104/300/200", link: "product.html?slug=strategy-board-game" },
    { name: "Family Card Game", desc: "Creative design, premium card stock", icon: "fas fa-users", img: "https://picsum.photos/id/106/300/200", link: "product.html?slug=family-card-game" },
    { name: "Kickstarter Edition", desc: "Deluxe components, custom packaging", icon: "fas fa-rocket", img: "https://picsum.photos/id/107/300/200", link: "product.html?slug=kickstarter-edition" }
];

const grid = document.getElementById('boardGamesGrid');
        if (grid) {
            caseStudies.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => {
                    if (item.link) {
                        window.location.href = item.link;
                    }
                };
                card.innerHTML = `
                    <div class="product-img" style="background: #f0f0f0; display: flex; align-items: center; justify-content: center;">
                        <img src="${item.img}" alt="${item.name}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
