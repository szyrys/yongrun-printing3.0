<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Yongrun Printing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-container {
            max-width: 100%;
            margin: 30px auto;
            padding: 20px;
        }
        
        .login-card {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        
        .tab-btn.active {
            border-bottom: 2px solid #c9a03d;
            color: #c9a03d;
        }
        
        /* ===== 关键：表格横向滚动 ===== */
        .table-wrapper {
            overflow-x: scroll !important;
            overflow-y: visible !important;
            width: 100% !important;
            display: block !important;
            border: 1px solid red; /* 临时加边框，确认这个元素存在 */
        }
        
        .data-table {
    width: 1200px !important;
    border-collapse: collapse;
    background: white;
}
        
        .data-table th,
        .data-table td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            white-space: nowrap;
        }
        
        .data-table th {
            background: #1a2a4f;
            color: white;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .add-btn {
            background: #27ae60;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .empty-state, .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
        }
        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- 登录面板 -->
    <div id="loginPanel" class="admin-container">
        <div class="login-card">
            <h2><i class="fas fa-lock"></i> 管理员登录</h2>
            <input type="email" id="adminEmail" placeholder="邮箱地址" autocomplete="email">
            <input type="password" id="adminPassword" placeholder="密码" autocomplete="current-password">
            <button id="loginBtn" class="btn btn-primary">登录</button>
            <div id="loginError" class="error-msg" style="display: none;"></div>
            <p style="margin-top: 20px; font-size: 12px; color: #999; text-align: center;">
                提示：请在 Supabase Authentication 中创建管理员账户
            </p>
        </div>
    </div>

    <!-- 管理面板 -->
    <div id="adminPanel" class="admin-container" style="display: none;">
        <div class="admin-header">
            <h1><i class="fas fa-cogs"></i> 管理后台</h1>
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> 登出</button>
        </div>
        
        <!-- 标签页 -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="messages">📋 留言管理</button>
            <button class="tab-btn" data-tab="faq">❓ FAQ 管理</button>
            <button class="tab-btn" data-tab="products">📦 产品管理</button>
        </div>
        
        <!-- 留言管理面板 -->
        <div id="messagesPanel" class="panel active">
            <button id="refreshMessagesBtn" class="add-btn" style="background: #3498db;">🔄 刷新留言</button>
            <div class="table-wrapper">
                <div id="messagesContainer">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载留言中...</div>
                </div>
            </div>
        </div>

        <!-- FAQ 管理面板 -->
        <div id="faqPanel" class="panel">
            <button id="addFaqBtn" class="add-btn">+ 添加 FAQ</button>
            <div class="table-wrapper">
                <div id="faqContainer">
                    <div class="loading">加载 FAQ 中...</div>
                </div>
            </div>
        </div>

        <!-- 产品管理面板 -->
        <div id="productsPanel" class="panel">
            <button id="addProductBtn" class="add-btn">+ 添加产品</button>
            <div class="table-wrapper">
                <div id="productsContainer">
                    <div class="loading">加载产品中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- FAQ 模态框 -->
    <div id="faqModal" class="modal">
        <div class="modal-content">
            <h3 id="faqModalTitle">添加 FAQ</h3>
            <input type="text" id="faqQuestion" placeholder="问题">
            <textarea id="faqAnswer" placeholder="回答" rows="4"></textarea>
            <input type="hidden" id="faqId">
            <button id="saveFaqBtn" class="btn btn-primary">保存</button>
            <button id="cancelFaqBtn" class="btn">取消</button>
        </div>
    </div>

    <!-- 产品模态框 -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="productModalTitle">添加产品</h3>
            <select id="productCategory">
                <option value="cards">Cards</option>
                <option value="books">Books</option>
                <option value="board-games">Board Games</option>
                <option value="puzzles">Puzzles</option>
            </select>
            <input type="text" id="productName" placeholder="产品名称 *">
            <input type="text" id="productSlug" placeholder="URL标识 (slug) * 例如: playingcards">
            <input type="text" id="productShortDesc" placeholder="简短描述">
            <textarea id="productFullDesc" placeholder="详细描述" rows="3"></textarea>
            <input type="text" id="productFeatures" placeholder="特点 (用 | 分隔)">
            <input type="text" id="productImageUrl" placeholder="图片URL (多张用逗号分隔)">
            <div style="display: flex; gap: 10px; align-items: center;">
                <label><input type="checkbox" id="productIsFeatured"> 置顶推荐</label>
            </div>
            <input type="hidden" id="productId">
            <button id="saveProductBtn" class="btn btn-primary">保存</button>
            <button id="cancelProductBtn" class="btn">取消</button>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 网站脚本 -->
    <script src="js/supabase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
