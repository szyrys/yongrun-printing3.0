                <a href="index.html">YONGRUN<span> Printing</span></a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                <li class="dropdown">
                    <a href="javascript:void(0)" data-i18n="nav_products">Products</a>
                    <ul class="dropdown-menu">
                        <li><a href="cards.html">Cards</a></li>
                        <li><a href="books.html">Books</a></li>
                        <li><a href="board-games.html">Board Games</a></li>

                </li>

            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1>Puzzles</h1>
            <p>Custom puzzle printing - showcase of our work</p>
        </div>
    </section>

    <!-- 印刷案例展示 -->
    <section class="products-page" style="padding: 60px 0;">
        <div class="container">
            <div class="product-grid" id="puzzlesGrid">
                <!-- 案例卡片会通过JS动态生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Shenzhen Yongrun Printing Co., Ltd. <span data-i18n="footer_rights">All Rights Reserved</span></p>
        </div>
    </main>\n</footer>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 网站脚本 -->
    <script src="js/supabase-config.js"></script>
    <script src="js/common.js"></script>
    <script>
        // 拼图类印刷案例（点击跳转详情页）
        const puzzleCases = [
            { name: "Children Puzzle", desc: "Educational puzzles for kids", icon: "fas fa-child", img: "https://picsum.photos/id/20/300/200", link: "product.html?slug=children-puzzle" },
            { name: "Wooden Puzzle", desc: "Premium wooden pieces, custom shapes", icon: "fas fa-tree", img: "https://picsum.photos/id/40/300/200", link: "product.html?slug=wooden-puzzle" },
            { name: "3D Puzzle", desc: "Interactive 3D puzzle designs", icon: "fas fa-cube", img: "https://picsum.photos/id/42/300/200", link: "product.html?slug=3d-puzzle" }
        ];

        const grid = document.getElementById('puzzlesGrid');
        if (grid) {
            puzzleCases.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => {
                    if (item.link) {
                        window.location.href = item.link;
                    }
                };
                card.innerHTML = `
                    <div class="product-img" style="background: #f0f0f0; display: flex; align-items: center; justify-content: center;">
                        <img src="${item.img}" alt="${item.name}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
