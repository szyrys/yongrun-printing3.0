<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzles - RUNCHENG Printing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .products-section-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .products-section-header h1 {
            font-size: 2.5rem;
            color: #1a2a4f;
            margin-bottom: 10px;
        }
        .products-section-header p {
            color: #666;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }
        
        .product-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        .product-card .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #1a2a4f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .product-card .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-card .product-img i {
            font-size: 3rem;
            color: white;
        }
        
        .product-card h3 {
            padding: 15px 15px 5px;
            color: #1a2a4f;
            font-size: 1.1rem;
        }
        
        .product-card p {
            padding: 0 15px 15px;
            color: #666;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        
        .loading, .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        @media (max-width: 1024px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">
    <main style="flex: 1;">
        <div class="language-bar">
            <div class="container">
                <div class="language-selector" id="languageSelector"></div>
            </div>
        </div>

<div id="globalNav"></div>
        <div class="container">
            <div class="products-section-header">
                <h1 data-i18n="nav_puzzles">Puzzles</h1>
                <p data-i18n="category_puzzles_desc">Custom paper puzzles for all ages - children's puzzles, educational puzzles, and floor puzzles. High-quality offset printing with eco-friendly materials. Perfect for gifts, educational toys, and promotional items.</p>
            </div>
        </div>

        <section class="products-page" style="padding: 0 0 60px 0;">
            <div class="container">
                <div class="product-grid" id="puzzlesGrid"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Shenzhen RUNCHENG Printing Co., Ltd. <span data-i18n="footer_rights">All Rights Reserved</span></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/nav.js"></script>
    <script>
        function truncateText(text, maxLength) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        function getLocalizedField(product, fieldName) {
            const lang = currentLang || 'en';
            if (lang === 'zh-CN') return product[`${fieldName}_zh`] || product[`${fieldName}_en`] || '';
            if (lang === 'zh-TW') return product[`${fieldName}_zh_tw`] || product[`${fieldName}_en`] || '';
            if (lang === 'es') return product[`${fieldName}_es`] || product[`${fieldName}_en`] || '';
            if (lang === 'de') return product[`${fieldName}_de`] || product[`${fieldName}_en`] || '';
            if (lang === 'pt') return product[`${fieldName}_pt`] || product[`${fieldName}_en`] || '';
            if (lang === 'ar') return product[`${fieldName}_ar`] || product[`${fieldName}_en`] || '';
            if (lang === 'ja') return product[`${fieldName}_ja`] || product[`${fieldName}_en`] || '';
            if (lang === 'ko') return product[`${fieldName}_ko`] || product[`${fieldName}_en`] || '';
            return product[`${fieldName}_en`] || '';
        }

        async function loadPuzzlesProducts() {
            const grid = document.getElementById('puzzlesGrid');
            if (!grid) return;
            
            grid.innerHTML = '<div class="loading">Loading products...</div>';
            
            try {
                const { data: products, error } = await window.supabaseClient
                    .from('products')
                    .select('*')
                    .eq('category', 'puzzles');
                
                if (error) throw error;
                
                if (!products || products.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No products found</div>';
                    return;
                }
                
                // 获取点击统计数据
                const { data: clicks } = await window.supabaseClient
                    .from('product_clicks')
                    .select('slug, click_count');
                
                const clickMap = new Map();
                if (clicks) {
                    clicks.forEach(c => clickMap.set(c.slug, c.click_count));
                }
                
                // 分离置顶和非置顶
                const featuredProducts = products.filter(p => p.is_featured === true);
                const normalProducts = products.filter(p => p.is_featured !== true);
                
                // 置顶按 sort_order 排序
                featuredProducts.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
                
                // 非置顶按热度排序
                normalProducts.sort((a, b) => {
                    const aClicks = clickMap.get(a.slug) || 0;
                    const bClicks = clickMap.get(b.slug) || 0;
                    if (aClicks !== bClicks) return bClicks - aClicks;
                    return (a.sort_order || 0) - (b.sort_order || 0);
                });
                
                // 合并：只取前4个置顶
                const finalProducts = [...featuredProducts.slice(0, 4), ...normalProducts];
                
                grid.innerHTML = '';
                
                finalProducts.forEach(product => {
                    const name = getLocalizedField(product, 'name');
                    const desc = getLocalizedField(product, 'desc');
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.onclick = () => { window.location.href = `product.html?slug=${product.slug}`; };
                    const imageUrl = product.image_url ? product.image_url.split(',')[0] : null;
                    if (imageUrl) {
                        card.innerHTML = `<div class="product-img"><img src="${imageUrl}" alt="${name}"></div><h3>${name}</h3><p>${truncateText(desc, 30)}</p>`;
                    } else {
                        card.innerHTML = `<div class="product-img"><i class="fas fa-image"></i></div><h3>${name}</h3><p>${truncateText(desc, 30)}</p>`;
                    }
                    grid.appendChild(card);
                });
                
            } catch (err) {
                console.error('加载失败:', err);
                grid.innerHTML = '<div class="empty-state">Failed to load, please refresh</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPuzzlesProducts);
        
        const originalLoadLanguage = loadLanguage;
        window.loadLanguage = async function(langCode) {
            await originalLoadLanguage(langCode);
            await loadPuzzlesProducts();
        };
    </script>
</body>
</html>
